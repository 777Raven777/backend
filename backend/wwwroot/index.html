<!DOCTYPE html>
<html>
<head>
    <title>SignalR Test</title>
    <style>
        body {
            font-family: Consolas, monospace;
            max-width: 600px;
            margin: 40px auto;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        h2 {
            color: #569cd6;
        }

        #status {
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .connected {
            background: #1e3a1e;
            color: #4ec94e;
        }

        .disconnected {
            background: #3a1e1e;
            color: #c94e4e;
        }

        #messages {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 12px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .msg {
            margin: 4px 0;
            padding: 4px 8px;
            border-left: 3px solid #569cd6;
        }

            .msg .user {
                color: #dcdcaa;
                font-weight: bold;
            }

            .msg .time {
                color: #6a9955;
                font-size: 12px;
            }

        input, button {
            padding: 8px 12px;
            border: 1px solid #3c3c3c;
            background: #3c3c3c;
            color: #d4d4d4;
            border-radius: 4px;
            font-size: 14px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        button {
            background: #0e639c;
            border-color: #0e639c;
            cursor: pointer;
            width: 100%;
            padding: 10px;
        }

            button:hover {
                background: #1177bb;
            }
    </style>
</head>
<body>
    <h2>SignalR Test Page</h2>
    <div id="status" class="disconnected">Disconnected</div>
    <div id="messages"></div>
    <input type="text" id="userInput" placeholder="Your name" />
    <input type="text" id="messageInput" placeholder="Type a message and press Enter" />
    <button onclick="send()">Send Message</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/chathub")
            .build();

        connection.on("ReceiveMessage", (user, message) => {
            const div = document.getElementById("messages");
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div class="msg"><span class="user">${user}:</span> ${message} <span class="time">${time}</span></div>`;
            div.scrollTop = div.scrollHeight;
        });

        connection.start()
            .then(() => {
                document.getElementById("status").textContent = "Connected";
                document.getElementById("status").className = "connected";
            })
            .catch(err => {
                document.getElementById("status").textContent = "Connection failed: " + err;
            });

        function send() {
            const user = document.getElementById("userInput").value || "Anonymous";
            const message = document.getElementById("messageInput").value;
            if (message) {
                connection.invoke("SendMessage", user, message);
                document.getElementById("messageInput").value = "";
            }
        }

        document.getElementById("messageInput").addEventListener("keyup", e => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
